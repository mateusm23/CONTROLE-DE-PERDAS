<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório Concreto — Portal de Auditoria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    .nav-back {
      position: fixed; top: 10px; left: 14px; z-index: 999;
      display: inline-flex; align-items: center; gap: 6px;
      height: 30px; padding: 0 12px; border-radius: 5px;
      font-size: 11px; font-weight: 600; text-decoration: none;
      background: #0d1f35; color: #e2e8f0;
      border: 1px solid #1b2d4a;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .nav-back:hover { background: #1b2a4a; }
  </style>
</head>
<body>

<a href="#" id="btnVoltar" class="nav-back">
  <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Painel
</a>

<div class="wrap">
  <div id="bloco-a"></div>
  <div id="bloco-b"></div>
  <div id="bloco-c"></div>
</div>

<div class="ftr">
  <p id="ftrL"><strong>Trinus</strong> · Engenharia de Custos &amp; BI · Rev. 00</p>
  <p id="ftrR">Auditoria de Concreto Usinado · Rev. 00</p>
</div>

<script>
window.TEXTS = {};
window.DATA  = { parametros:{}, orcamento:[], cronograma:[], evolucaoB:[], concretoC:[] };
window.OBRA  = {};

var SUPA_URL = 'https://lqlkyrjmwbfibjkvgjxc.supabase.co';
var SUPA_KEY = 'sb_publishable_VFdiDiAnPL_-UWyxpcMPBA_8LwGIXkH';
var db       = supabase.createClient(SUPA_URL, SUPA_KEY);
var OBRA_ID  = new URLSearchParams(window.location.search).get('obra');
if (!OBRA_ID) { window.location.href = 'home.html'; }

document.getElementById('btnVoltar').href = 'painel.html?obra=' + OBRA_ID;

// Mantém loadTexts para compatibilidade com textos estáticos (falha silenciosa)
function loadTexts() {
  function parseWorkbook(wb) {
    var ws = wb.Sheets[wb.SheetNames[0]];
    XLSX.utils.sheet_to_json(ws).forEach(function(r) {
      if (r.ID) window.TEXTS[String(r.ID).trim()] = r.Texto !== undefined ? String(r.Texto) : '';
    });
  }
  return fetch('texts.xlsx')
    .then(function(r) { if (!r.ok) throw new Error('não encontrado'); return r.arrayBuffer(); })
    .then(function(buf) { parseWorkbook(XLSX.read(buf)); })
    .catch(function() {
      return fetch('texts.csv')
        .then(function(r) { return r.text(); })
        .then(function(txt) { parseWorkbook(XLSX.read(txt, {type:'string'})); })
        .catch(function() {});
    });
}

function applyTexts() {
  document.querySelectorAll('[data-txt]').forEach(function(el) {
    var v = window.TEXTS[el.getAttribute('data-txt')];
    if (v !== undefined && v !== '') el.textContent = v;
  });
}

function loadModule(id) {
  return fetch('modules/bloco-' + id + '.html')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(html) {
      var container = document.getElementById('bloco-' + id);
      var doc = new DOMParser().parseFromString(html, 'text/html');
      doc.head.querySelectorAll('style').forEach(function(style) {
        var s = document.createElement('style');
        s.textContent = style.textContent;
        document.head.appendChild(s);
      });
      Array.from(doc.body.children).forEach(function(child) {
        if (child.tagName !== 'SCRIPT') {
          container.appendChild(document.importNode(child, true));
        }
      });
      doc.body.querySelectorAll('script').forEach(function(old) {
        var s = document.createElement('script');
        if (old.type) s.type = old.type;
        s.textContent = old.textContent;
        container.appendChild(s);
      });
    })
    .catch(function(err) {
      document.getElementById('bloco-' + id).innerHTML =
        '<div style="padding:14px 18px;border:1px solid #fca5a5;background:#fef2f2;border-radius:5px;margin-bottom:16px;font-size:12px;color:#c0392b">' +
        '<strong>Erro ao carregar bloco-' + id + '.html</strong> (' + err.message + ')<br>' +
        '<span style="color:#6b7280">Abra via <strong>VS Code Live Server</strong> ou GitHub Pages.</span></div>';
    });
}

async function loadData() {
  var results = await Promise.all([
    db.from('obras').select('*').eq('id', OBRA_ID).single(),
    db.from('orcamento').select('*').eq('obra_id', OBRA_ID).order('created_at', { ascending: true }),
    db.from('visao_fisica').select('*').eq('obra_id', OBRA_ID).order('created_at', { ascending: true }),
    db.from('apropriacao').select('*').eq('obra_id', OBRA_ID).order('data_nf', { ascending: true })
  ]);

  var obra    = results[0].data || {};
  var orcRows = results[1].data || [];
  var fisRows = results[2].data || [];
  var aprRows = results[3].data || [];

  window.OBRA = obra;

  // Parâmetros globais
  var BAC = orcRows.reduce(function(s, r) { return s + (+r.qtd_orc||0) * (+r.rs_unitario||0); }, 0);
  var totalQtdOrc = orcRows.reduce(function(s, r) { return s + (+r.qtd_orc||0); }, 0);
  var VLR_ORC = totalQtdOrc > 0 ? BAC / totalQtdOrc : 870;

  var hoje = new Date();
  var pad  = function(n) { return String(n).padStart(2,'0'); };
  var dataHoje = pad(hoje.getDate()) + '/' + pad(hoje.getMonth()+1) + '/' + hoje.getFullYear();
  var dataBase = pad(hoje.getMonth()+1) + '/' + hoje.getFullYear();

  window.DATA.parametros = {
    BAC:        BAC || 1,
    VlrUntOrc:  Math.round(VLR_ORC),
    DataHoje:   dataHoje,
    DataBase:   dataBase
  };

  // ── Orçamento → bloco-a tabela ──
  var totalOrc = BAC || 1;
  window.DATA.orcamento = orcRows.map(function(r) {
    var rTotal = (+r.qtd_orc||0) * (+r.rs_unitario||0);
    var pct    = rTotal / totalOrc * 100;
    return {
      Grupo:      r.descricao || '',
      Unidade:    r.unidade   || 'm³',
      QtdOrc:     +r.qtd_orc  || 0,
      RsUnitario: +r.rs_unitario || 0,
      RsTotal:    rTotal,
      PctTotal:   pct,
      PesoGrupo:  pct
    };
  });

  // ── visao_fisica → cronograma (Gantt) ──
  // Usa data_concretagem como data real; PlanS/PlanE vazios → barra de plano omitida
  var totalFisPrev = fisRows.reduce(function(s, r) { return s + (+r.vol_previsto||0); }, 0) || 1;

  function isoToBR(s) {
    if (!s) return '';
    var p = s.split('-');
    return p.length === 3 ? p[2]+'/'+p[1]+'/'+p[0] : s;
  }

  window.DATA.cronograma = fisRows.map(function(r) {
    var pct   = (+r.vol_previsto||0) > 0 ? (+r.vol_realizado||0) / (+r.vol_previsto||0) * 100 : 0;
    var peso  = (+r.vol_previsto||0) / totalFisPrev * 100;
    var data  = isoToBR(r.data_concretagem);
    var done  = pct >= 100;
    var prog  = pct > 0 && !done;
    return {
      Pavimento: (r.elemento||'') + (r.fase ? ' — ' + r.fase : ''),
      Grupo:     'Torre',
      Peso:      peso,
      PlanS:     '',
      PlanE:     '',
      RealS:     (done || prog) && data ? data : '',
      RealE:     done && data ? data : '',
      ReprogS:   '',
      ReprogE:   ''
    };
  });

  // ── visao_fisica → evolucaoB (bloco-b) ──
  window.DATA.evolucaoB = fisRows.map(function(r) {
    var pct = (+r.vol_previsto||0) > 0 ? (+r.vol_realizado||0) / (+r.vol_previsto||0) * 100 : 0;
    return { Pavimento: (r.elemento||'') + (r.fase ? ' — ' + r.fase : ''), PctExec: pct };
  });

  // ── visao_fisica + apropriacao → concretoC (bloco-c) ──
  // Distribui apropriações proporcionalmente ao volume previsto de cada elemento
  var totalQtdAprop = aprRows.reduce(function(s, r) { return s + (+r.volume||0); }, 0);
  var totalValAprop = aprRows.reduce(function(s, r) { return s + (+r.volume||0) * (+r.rs_unitario||0); }, 0);
  var vlrUntAprop   = totalQtdAprop > 0 ? totalValAprop / totalQtdAprop : 0;

  window.DATA.concretoC = fisRows.map(function(r) {
    var pct   = (+r.vol_previsto||0) > 0 ? (+r.vol_realizado||0) / (+r.vol_previsto||0) * 100 : 0;
    var peso  = (+r.vol_previsto||0) / totalFisPrev;
    var qtdAp = pct > 0 ? totalQtdAprop * peso : 0;
    return {
      Pavimento:    (r.elemento||'') + (r.fase ? ' — ' + r.fase : ''),
      PctExec:      pct,
      QtdPrevTotal: +r.vol_previsto || 0,
      QtdAprop:     Math.round(qtdAp * 10) / 10,
      VlrUntAprop:  vlrUntAprop,
      VlrUntTend:   vlrUntAprop || VLR_ORC,
      QtdTend:      +r.vol_previsto || 0
    };
  });
}

function applyObraData() {
  var o    = window.OBRA || {};
  var meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var hoje  = new Date();
  var dbStr = meses[hoje.getMonth()] + '/' + hoje.getFullYear();
  var nome  = (o.nome||'') + (o.codigo ? ' — ' + o.codigo : '');
  var empresa = o.construtora || o.responsavel || '';

  function q(sel) { return document.querySelector(sel); }
  function setTxt(sel, txt) { var e = q(sel); if (e) e.textContent = txt; }

  setTxt('[data-txt="C06"]', nome);
  setTxt('[data-txt="C07"]', empresa);

  // Rodapé
  var fL = document.getElementById('ftrL');
  if (fL) fL.innerHTML = '<strong>Trinus</strong> · Engenharia de Custos &amp; BI · ' + nome + ' · Rev. 00 · ' + dbStr;
  var fR = document.getElementById('ftrR');
  if (fR) fR.textContent = 'Auditoria de Concreto Usinado — ' + nome + ' · Rev. 00';

  // Foto de capa
  if (o.foto_url) {
    var imgEl = q('.capa-right img');
    if (imgEl) imgEl.src = o.foto_url;
  }
}

loadTexts()
  .then(loadData)
  .then(function() { return Promise.all(['a', 'b', 'c'].map(loadModule)); })
  .then(function() {
    applyTexts();
    applyObraData();
  });
</script>

</body>
</html>
