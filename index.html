<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório Concreto v1 — BE Bonifácio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="wrap">
  <div id="bloco-a"></div>
  <div id="bloco-b"></div>
  <div id="bloco-c"></div>
</div>

<div class="ftr">
  <p data-txt="F01"><strong>Trinus</strong> · Engenharia de Custos &amp; · BE Bonifácio — OBRBO · Rev. 00 · Jun/2026</p>
  <p data-txt="F02">Auditoria de Concreto Usinado — BE Bonifácio · OBRBO · Rev. 00</p>
</div>

<script>
// Dicionário global de textos — populado por loadTexts() antes dos módulos
window.TEXTS = {};

// Lê texts.xlsx (preferencial) ou texts.csv (fallback) via SheetJS
function loadTexts() {
  function parseWorkbook(wb) {
    var ws = wb.Sheets[wb.SheetNames[0]];
    XLSX.utils.sheet_to_json(ws).forEach(function(r) {
      if (r.ID) window.TEXTS[String(r.ID).trim()] = r.Texto !== undefined ? String(r.Texto) : '';
    });
  }
  return fetch('texts.xlsx')
    .then(function(r) {
      if (!r.ok) throw new Error('xlsx not found');
      return r.arrayBuffer();
    })
    .then(function(buf) { parseWorkbook(XLSX.read(buf)); })
    .catch(function() {
      return fetch('texts.csv')
        .then(function(r) { return r.text(); })
        .then(function(text) { parseWorkbook(XLSX.read(text, {type:'string'})); })
        .catch(function() {});
    });
}

// Injeta textContent em todos os elementos com data-txt após os módulos estarem no DOM
function applyTexts() {
  document.querySelectorAll('[data-txt]').forEach(function(el) {
    var v = window.TEXTS[el.getAttribute('data-txt')];
    if (v !== undefined && v !== '') el.textContent = v;
  });
}

// Carrega um módulo HTML e retorna Promise que resolve após scripts executados
function loadModule(id) {
  return fetch('modules/bloco-' + id + '.html')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(html) {
      var container = document.getElementById('bloco-' + id);
      var doc = new DOMParser().parseFromString(html, 'text/html');
      doc.head.querySelectorAll('style').forEach(function(style) {
        var s = document.createElement('style');
        s.textContent = style.textContent;
        document.head.appendChild(s);
      });
      Array.from(doc.body.children).forEach(function(child) {
        if (child.tagName !== 'SCRIPT') {
          container.appendChild(document.importNode(child, true));
        }
      });
      doc.body.querySelectorAll('script').forEach(function(old) {
        var s = document.createElement('script');
        if (old.type) s.type = old.type;
        s.textContent = old.textContent;
        container.appendChild(s);
      });
    })
    .catch(function(err) {
      document.getElementById('bloco-' + id).innerHTML =
        '<div style="padding:14px 18px;border:1px solid #fca5a5;background:#fef2f2;border-radius:5px;margin-bottom:16px;font-size:12px;color:#c0392b">' +
        '<strong>Erro ao carregar bloco-' + id + '.html</strong> (' + err.message + ')<br>' +
        '<span style="color:#6b7280">Para a visão completa, abra com <strong>VS Code Live Server</strong>.<br>' +
        'Para ver um módulo isolado, abra <code>modules/bloco-' + id + '.html</code> diretamente no browser.</span></div>';
    });
}

// Lê data.xlsx e popula window.DATA com 5 objetos
function loadData() {
  return fetch('data.xlsx')
    .then(function(r) { if (!r.ok) throw new Error('data.xlsx not found'); return r.arrayBuffer(); })
    .then(function(buf) {
      var wb = XLSX.read(buf, {type: 'buffer'});
      window.DATA = {};
      var ws1 = wb.Sheets['Parametros'];
      if (ws1) {
        var params = {};
        XLSX.utils.sheet_to_json(ws1).forEach(function(row) {
          if (row.Chave !== undefined) {
            var v = row.Valor;
            var s = String(v == null ? '' : v).trim();
            var n = Number(s);
            params[String(row.Chave)] = (s !== '' && !isNaN(n)) ? n : s;
          }
        });
        window.DATA.parametros = params;
      }
      var sheets = ['Orcamento','Cronograma','Evolucao-B','Concreto-C'];
      var keys   = ['orcamento','cronograma','evolucaoB','concretoC'];
      sheets.forEach(function(name, i) {
        var ws = wb.Sheets[name];
        window.DATA[keys[i]] = ws ? XLSX.utils.sheet_to_json(ws) : [];
      });
    })
    .catch(function(err) {
      console.warn('data.xlsx nao encontrado:', err.message);
      window.DATA = { parametros:{}, orcamento:[], cronograma:[], evolucaoB:[], concretoC:[] };
    });
}

// Fluxo: textos → dados → módulos em paralelo → aplica textos estáticos
loadTexts()
  .then(loadData)
  .then(function() {
    return Promise.all(['a', 'b', 'c'].map(loadModule));
  })
  .then(applyTexts);
</script>

</body>
</html>
